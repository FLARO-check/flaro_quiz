<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLARO 理解度チェック｜Day 5</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;padding:24px 16px}
.container{max-width:560px;margin:0 auto}
.back{font-size:13px;color:#999;background:none;border:none;cursor:pointer;padding:0;margin-bottom:16px;display:block}
.back:hover{color:#1a1a1a}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.08em;background:#1a1a1a;color:#f5f4f0;padding:3px 9px;border-radius:3px;margin-bottom:8px}
.title{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:3px}
.subtitle{font-size:12px;color:#888;margin-bottom:24px}
.form-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px}
.form-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:4px}
.req{color:#c0392b;margin-left:2px}
.field input{width:100%;padding:9px 12px;border:1.5px solid #e8e8e4;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fafafa;outline:none;transition:border 0.15s}
.field input:focus{border-color:#1a1a1a;background:#fff}
.field input.error{border-color:#c0392b}
.err-msg{font-size:11px;color:#c0392b;margin-top:3px;display:none}
.start-btn{width:100%;padding:12px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.15s}
.start-btn:hover{background:#333}
.progress-wrap{margin-bottom:16px}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:5px}
.progress-bg{height:3px;background:#ddd;border-radius:2px}
.progress-fill{height:3px;background:#1a1a1a;border-radius:2px;transition:width 0.35s}
.dot-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.dot{width:9px;height:9px;border-radius:50%;background:#e0e0e0;cursor:pointer}
.dot.done{background:#aaa}.dot.cur{background:#1a1a1a}
.q-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px}
.q-fn{font-size:10px;font-weight:700;letter-spacing:0.05em;color:#ccc;margin-bottom:5px}
.q-text{font-size:14px;font-weight:500;line-height:1.65;margin-bottom:14px}
.choices{display:flex;flex-direction:column;gap:7px}
.choice{padding:11px 13px;border-radius:8px;border:1.5px solid #e8e8e4;background:#fafafa;font-size:13px;color:#333;cursor:pointer;text-align:left;transition:all 0.12s;line-height:1.5;width:100%}
.choice:hover{border-color:#999;background:#f0efeb}
.choice.selected{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.nav{display:flex;justify-content:space-between;align-items:center;gap:8px}
.btn{font-size:13px;font-weight:500;padding:9px 16px;border-radius:8px;border:1.5px solid #1a1a1a;background:transparent;color:#1a1a1a;cursor:pointer;transition:all 0.15s}
.btn:hover{background:#1a1a1a;color:#fff}
.btn:disabled{opacity:0.22;cursor:default}
.btn-primary{background:#1a1a1a;color:#fff}
.btn-primary:disabled{opacity:0.22;cursor:default}
.result-card{background:#fff;border-radius:12px;padding:28px 20px;text-align:center}
.result-score{font-size:48px;font-weight:700;line-height:1;margin-bottom:4px}
.great{color:#2d7a4f}.ok{color:#b07d1a}.low{color:#c0392b}
.result-label{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6}
.review-list{text-align:left;margin-bottom:20px}
.review-item{padding:12px 14px;border-radius:8px;margin-bottom:7px;font-size:13px;line-height:1.55}
.review-item.c{background:#edf7f1;border:1px solid #b7dfc9;color:#1a4a30}
.review-item.w{background:#fdf0ef;border:1px solid #f0b9b5;color:#7a1a12}
.ans{font-size:12px;margin-top:3px;opacity:0.75}
.explain{font-size:11px;margin-top:5px;padding-top:5px;border-top:0.5px solid currentColor;opacity:0.65;line-height:1.5}
.result-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.sending{font-size:12px;color:#888;margin-bottom:12px}</style>
</head>
<body>
<div class="container">
  <button class="back" onclick="location.href='index.html'">← Dayを選びなおす</button>
  <div class="badge">Day 5</div>
  <div class="title">理解度チェッククイズ</div>
  <div class="subtitle">予算・日報・レポート（店舗向け運用）</div>
  <div id="app"></div>
</div>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyRIJg_fCHZqUeKK8mEgjjlHZvCfTnyikGA69zyFny3mBGLjhSTDqJVKInyrzcAC_cY/exec";
const DAY = "Day 5";
const qs = [{"fn": "日報", "q": "店舗で「日報」の申請機能を利用し、日報が承認された場合の正しい動作はどれですか？", "choices": ["承認された後でも店長権限であれば自由に編集できる", "日報の内容が編集できなくなり、ロックされる", "その日の勤怠データも同時に確定される", "翌日の売上予算がAIによって自動的に修正される"], "ans": 1, "explain": "レポート承認機能を使用している場合、日報が承認されると編集できなくなり、報告内容が確定（ロック）されます。"}, {"fn": "小口現金管理", "q": "「日報」の小口現金管理で取引金額を入力する際のFLAROでの正しい入力ルールはどれですか？", "choices": ["消費税を除いた税抜金額を入力する", "消費税を含んだ税込金額を入力する", "消費税額のみを入力する", "小口現金は日報からは入力できない"], "ans": 1, "explain": "小口取引で入力した金額はシステムが自動的に消費税を計算して税抜金額へ変換するため、税込金額を入力します。"}, {"fn": "予算編成", "q": "客数の予算設定はどのように設定ができますか？", "choices": ["日報の「基本設定」タブで日々予算客数入力を行う", "日報の「基本設定」タブで予算客単価を入力することで算出される", "予算編成で日々の予算客数入力を行う", "予算編成で予算客単価を入力することで算出される"], "ans": 3, "explain": "「予算編成」画面において売上予算とともに「予算客単価」を設定することで、システムが自動的に算出・反映します。"}, {"fn": "経費精算", "q": "日報の「経費精算」においてシステム連携の仕入れ数値を計上するには何が必要ですか？", "choices": ["取引先を指定して税抜金額を手入力", "取引先を指定して税込金額を手入力", "インフォマート画面での受領処理", "小口現金管理画面で仕入れ金額を手入力"], "ans": 2, "explain": "インフォマートと連携している場合、インフォマート側で受領処理が行われた請求書の金額が、そのままFLAROの食材費（仕入れ）として自動的に連携・計上されます。"}, {"fn": "日報", "q": "「日報」で店舗の写真やジャーナルレシートの写真を添付したい場合、どのタブで添付ができますか？", "choices": ["進捗状況", "基本情報", "経費精算", "申請・承認"], "ans": 3, "explain": "日報の「申請・承認」タブには画像などのファイルを添付する機能が用意されています。店舗の状況写真やジャーナルレシートなどを添付して報告する際にご活用ください。"}, {"fn": "日報", "q": "「日報」でタスク完了の報告を行う際、適切なフローはどれですか？", "choices": ["該当タスクを選んで「更新する」を押す", "該当タスクを選んで「対応完了」を押す", "担当者がLINEでタスク完了の報告を行う", "コメント機能で完了報告を行う"], "ans": 1, "explain": "日報のタスクタブから該当のタスクを選択し、「対応完了」の操作を行うことで、タスクの進捗が完了状態としてシステムに反映されます。"}, {"fn": "勤務速報", "q": "「勤務速報（店舗速報）」画面の仕様について、正しい説明はどれですか？", "choices": ["PCからのみ確認可能で、スマートフォンからは見られない", "出勤中や未出勤、遅刻・早退の人数がリアルタイムで確認できる", "登録された日報のコメント一覧が流れて表示される", "次の月のシフト提出状況がグラフで確認できる"], "ans": 1, "explain": "勤務速報（店舗速報）では出勤中・未出勤・遅刻・早退の人数をリアルタイムで把握できます。PCだけでなくスマートフォンからも確認が可能です。"}, {"fn": "レポート", "q": "「レポート」において、確認できない項目はどれですか？", "choices": ["日別の売上実績と当日までの売上実績合計", "売上実績に対するフード・ドリンク経費の実績割合", "労働形態ごとの総労働時間", "シフト整合率"], "ans": 3, "explain": "日別売上や各種経費の割合、労働形態ごとの人件費等は「レポート」画面から確認できますが、「シフト整合率」などの詳細な従業員指標は月次帳票の「FLARO分析」画面から確認します。"}];
const alpha = ['A','B','C','D'];
let phase = 'form';
let userInfo = {};
let cur = 0, answers = new Array(qs.length).fill(null), done = false;

function render() {
  if (phase === 'form') renderForm();
  else if (phase === 'quiz') renderQuiz();
  else renderResult();
}

function renderForm() {
  document.getElementById('app').innerHTML = `
    <div class="form-card">
      <div class="form-title">はじめに情報を入力してください</div>
      <div class="field">
        <label>会社名<span class="req">*</span></label>
        <input type="text" id="f-company" placeholder="例：株式会社○○フード">
        <div class="err-msg" id="e-company">会社名を入力してください</div>
      </div>
      <div class="field">
        <label>氏名<span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="例：田中 太郎">
        <div class="err-msg" id="e-name">氏名を入力してください</div>
      </div>
      <div class="field">
        <label>店舗名<span style="font-size:11px;color:#bbb;margin-left:4px">任意</span></label>
        <input type="text" id="f-store" placeholder="例：渋谷店">
      </div>
      <button class="start-btn" onclick="startQuiz()">クイズをスタートする</button>
    </div>
  `;
}

function startQuiz() {
  const company = document.getElementById('f-company').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const store = document.getElementById('f-store').value.trim();
  let valid = true;
  if (!company) {
    document.getElementById('f-company').classList.add('error');
    document.getElementById('e-company').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('f-company').classList.remove('error');
    document.getElementById('e-company').style.display = 'none';
  }
  if (!name) {
    document.getElementById('f-name').classList.add('error');
    document.getElementById('e-name').style.display = 'block';
    valid = false;
  } else {
    document.getElementById('f-name').classList.remove('error');
    document.getElementById('e-name').style.display = 'none';
  }
  if (!valid) return;
  userInfo = { company, name, store };
  phase = 'quiz';
  render();
}

function renderQuiz() {
  const q = qs[cur];
  const pct = Math.round(((cur+1)/qs.length)*100);
  document.getElementById('app').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta"><span>${q.fn}</span><span>${cur+1} / ${qs.length}</span></div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="dot-row">${qs.map((_,i)=>'<div class="dot'+(answers[i]!==null?' done':'')+(i===cur?' cur':'')+'" onclick="go('+i+')"></div>').join('')}</div>
    <div class="q-card">
      <div class="q-fn">${q.fn}</div>
      <div class="q-text">Q${cur+1}. ${q.q}</div>
      <div class="choices">${q.choices.map((c,i)=>'<button class="choice'+(answers[cur]===i?' selected':'')+'" onclick="sel('+i+')">'+alpha[i]+'. '+c+'</button>').join('')}</div>
    </div>
    <div class="nav">
      <button class="btn" onclick="prev()" ${cur===0?'disabled':''}>← 前へ</button>
      <button class="btn" onclick="next()" ${cur===qs.length-1?'disabled':''}>次へ →</button>
      <button class="btn btn-primary" onclick="submit()" ${answers.includes(null)?'disabled':''}>採点する</button>
    </div>
  `;
}

function go(i){cur=i;render();}
function sel(i){answers[cur]=i;render();}
function prev(){if(cur>0){cur--;render();}}
function next(){if(cur<qs.length-1){cur++;render();}}
function submit(){if(answers.includes(null))return;done=true;sendData();phase='result';render();}

function sendData() {
  const correct = qs.filter((_,i)=>answers[i]===qs[i].ans).length;
  const answerLabels = answers.map((a,i)=>{
    if(a===null) return '未回答';
    return alpha[a]+(a===qs[i].ans?' ○':' ✕');
  });
  const payload = {
    company: userInfo.company,
    name: userInfo.name,
    store: userInfo.store,
    day: DAY,
    score: correct,
    total: qs.length,
    answers: answerLabels
  };
  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).catch(()=>{});
}

function renderResult() {
  const correct = qs.filter((_,i)=>answers[i]===qs[i].ans).length;
  const pct = Math.round((correct/qs.length)*100);
  const cls = pct>=80?'great':pct>=60?'ok':'low';
  const msg = pct>=80?'理解度バッチリです！':'苦手な箇所を復習してみましょう。';
  document.getElementById('app').innerHTML = `
    <div class="result-card">
      <div style="font-size:11px;color:#ccc;font-weight:700;letter-spacing:0.06em;margin-bottom:4px">DAY ${userInfo.name} さんの結果</div>
      <div class="result-score ${cls}">${correct}<span style="font-size:20px;font-weight:400"> / ${qs.length}</span></div>
      <div class="result-label">${pct}点 · ${msg}</div>
      <div class="sending">※ 回答データを送信しました</div>
      <div class="review-list">${qs.map((q,i)=>{const ok=answers[i]===q.ans;return'<div class="review-item '+(ok?'c':'w')+'"><div>'+(ok?'○':'✕')+' Q'+(i+1)+'. '+q.q+'</div>'+(ok?'':'<div class="ans">正解：'+alpha[q.ans]+'. '+q.choices[q.ans]+'</div>')+'<div class="explain">'+q.explain+'</div></div>';}).join('')}</div>
      <div class="result-actions">
        <button class="btn" onclick="retry()">もう一度挑戦する</button>
        
      </div>
    </div>
  `;
}

function retry(){answers=new Array(qs.length).fill(null);cur=0;done=false;phase='form';userInfo={};render();}
render();
</script>
</body>
</html>
