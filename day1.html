<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLARO 理解度チェック｜Day 1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;padding:24px 16px}
.container{max-width:560px;margin:0 auto}
.back{font-size:13px;color:#999;background:none;border:none;cursor:pointer;padding:0;margin-bottom:16px;display:block}
.back:hover{color:#1a1a1a}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.08em;background:#1a1a1a;color:#f5f4f0;padding:3px 9px;border-radius:3px;margin-bottom:8px}
.title{font-size:20px;font-weight:700;line-height:1.3;margin-bottom:3px}
.subtitle{font-size:12px;color:#888;margin-bottom:24px}
.form-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px}
.form-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:4px}
.req{color:#c0392b;margin-left:2px}
.field input{width:100%;padding:9px 12px;border:1.5px solid #e8e8e4;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fafafa;outline:none;transition:border 0.15s}
.field input:focus{border-color:#1a1a1a;background:#fff}
.field input.error{border-color:#c0392b}
.err-msg{font-size:11px;color:#c0392b;margin-top:3px;display:none}
.start-btn{width:100%;padding:12px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.15s}
.start-btn:hover{background:#333}
.progress-wrap{margin-bottom:16px}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:5px}
.progress-bg{height:3px;background:#ddd;border-radius:2px}
.progress-fill{height:3px;background:#1a1a1a;border-radius:2px;transition:width 0.35s}
.dot-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.dot{width:9px;height:9px;border-radius:50%;background:#e0e0e0;cursor:pointer}
.dot.done{background:#aaa}.dot.cur{background:#1a1a1a}
.q-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px}
.q-fn{font-size:10px;font-weight:700;letter-spacing:0.05em;color:#ccc;margin-bottom:5px}
.q-text{font-size:14px;font-weight:500;line-height:1.65;margin-bottom:14px}
.choices{display:flex;flex-direction:column;gap:7px}
.choice{padding:11px 13px;border-radius:8px;border:1.5px solid #e8e8e4;background:#fafafa;font-size:13px;color:#333;cursor:pointer;text-align:left;transition:all 0.12s;line-height:1.5;width:100%}
.choice:hover{border-color:#999;background:#f0efeb}
.choice.selected{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.nav{display:flex;justify-content:space-between;align-items:center;gap:8px}
.btn{font-size:13px;font-weight:500;padding:9px 16px;border-radius:8px;border:1.5px solid #1a1a1a;background:transparent;color:#1a1a1a;cursor:pointer;transition:all 0.15s}
.btn:hover{background:#1a1a1a;color:#fff}
.btn:disabled{opacity:0.22;cursor:default}
.btn-primary{background:#1a1a1a;color:#fff}
.btn-primary:disabled{opacity:0.22;cursor:default}
.survey-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:12px}
.survey-title{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:4px}
.survey-sub{font-size:12px;color:#888;margin-bottom:18px}
.survey-q{margin-bottom:18px}
.survey-q-label{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:8px}
.scale-row{display:flex;gap:6px}
.scale-btn{width:44px;height:44px;border-radius:8px;border:1.5px solid #e8e8e4;background:#fafafa;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.12s;flex-shrink:0}
.scale-btn:hover{border-color:#999}
.scale-btn.active{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.survey-err{font-size:11px;color:#c0392b;margin-top:4px;display:none}
.submit-survey{width:100%;padding:12px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px}
.submit-survey:hover{background:#333}
.result-card{background:#fff;border-radius:12px;padding:28px 20px;text-align:center}
.result-score{font-size:48px;font-weight:700;line-height:1;margin-bottom:4px}
.great{color:#2d7a4f}.ok{color:#b07d1a}.low{color:#c0392b}
.result-label{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6}
.sending{font-size:12px;color:#aaa;margin-bottom:14px}
.review-list{text-align:left;margin-bottom:20px}
.review-item{padding:12px 14px;border-radius:8px;margin-bottom:7px;font-size:13px;line-height:1.55}
.review-item.c{background:#edf7f1;border:1px solid #b7dfc9;color:#1a4a30}
.review-item.w{background:#fdf0ef;border:1px solid #f0b9b5;color:#7a1a12}
.ans{font-size:12px;margin-top:3px;opacity:0.75}
.explain{font-size:11px;margin-top:5px;padding-top:5px;border-top:0.5px solid currentColor;opacity:0.65;line-height:1.6;white-space:pre-line}
.result-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="container">
  <button class="back" onclick="location.href='index.html'">← Dayを選びなおす</button>
  <div class="badge">Day 1</div>
  <div class="title">理解度チェッククイズ</div>
  <div class="subtitle">打刻設定・シフト管理（本部向け）</div>
  <div id="app"></div>
</div>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyRIJg_fCHZqUeKK8mEgjjlHZvCfTnyikGA69zyFny3mBGLjhSTDqJVKInyrzcAC_cY/exec";
const DAY = "Day 1";
const qs = [{"fn": "新規ユーザー登録", "q": "FLAROを利用するための「新規ユーザー登録」において、ログインIDとして使用される情報はどれですか？", "choices": ["任意の英数字によるID", "携帯電話番号", "名前", "メールアドレス"], "ans": 3, "explain": "ログインIDとして使用されるのは「スタッフマスタ」に登録された「メールアドレス」です。\n📍 ログイン画面 ＞ 新規ユーザー登録 または メニューバー ＞ 勤怠 ＞ スタッフマスタ"}, {"fn": "ユーザー登録状況確認", "q": "「ユーザー登録状況確認」画面で確認できるステータスとして、正しくないものはどれですか？", "choices": ["顔写真の登録有無（顔写真あり / なし）", "メールアドレスの登録有無", "打刻IDの登録有無", "新規ユーザー登録の状況（完了 / 未登録）"], "ans": 2, "explain": "この画面では「メールアドレス登録の有無」「新規ユーザー登録状況」「顔写真の登録状況」の3つが確認できます。打刻IDの登録有無は「スタッフマスタ」などの別画面で確認します。\n📍 メニューバー ＞ 設定 ＞ 設定① ＞ ユーザー登録状況確認"}, {"fn": "打刻設定", "q": "出退勤を行うために必要な設定として、正しい設定項目はどれですか？", "choices": ["雇用契約書の登録", "シフト設定と登録", "端末設定と顔写真登録", "生年月日の設定"], "ans": 2, "explain": "端末設定でその端末をタイムレコーダーに設定し、顔写真登録で顔認証打刻が可能になります。\n📍 メニューバー ＞ 設定 ＞ 打刻設定 ＞ 端末設定 / 顔写真登録"}, {"fn": "ヘルプ勤務", "q": "ヘルプ勤務の際の打刻方法として、正しい項目はどれですか？", "choices": ["ヘルプ先のタイムレコーダー端末で打刻する", "打刻は行わない", "所属店舗に立ち寄って打刻してからヘルプ先で勤務する", "所属店舗に立ち寄って打刻してからヘルプ先でも打刻する"], "ans": 0, "explain": "一度顔写真登録を完了させれば、どの店舗の端末でも打刻が可能です。ヘルプ先の端末でそのまま打刻してください。"}, {"fn": "勤怠エラー対応", "q": "退勤漏れや勤怠エラーが発生した場合の対応として、正しい項目はどれですか？", "choices": ["エラーについては修正が必要だが、退勤漏れについては修正不要", "エラーについては修正は不要だが、退勤漏れについては修正が必要", "エラーも退勤漏れも修正は不要", "エラーも退勤漏れも修正が必要"], "ans": 3, "explain": "退勤漏れもエラーも修正が必須です。エラーが残っていると勤怠確定ができません。\n📍 メニューバー ＞ 勤怠 ＞ 勤務データ確認 または ベルマーク ＞ 勤怠エラーリスト"}, {"fn": "勤怠修正フロー", "q": "勤怠修正時の流れについて、正しいものはどれですか？", "choices": ["エラーのある勤怠を修正し、申請を経て承認されることで緑枠表示になる", "エラーのある勤怠を修正し、申請を経て承認されることで青枠表示になる", "エラーのない勤怠を修正し、申請を経て承認されることで緑枠表示になる", "エラーのない勤怠を修正し、申請を経て承認されることで黄枠表示になる"], "ans": 1, "explain": "枠色の意味：赤＝エラー / 黄＝アラート / 緑＝申請中 / 青＝承認済。マネージャーまたはシニアマネージャーが承認すると青枠になります。\n📍 メニューバー ＞ 勤怠 ＞ 勤務データ確認 / 勤怠エラーリスト / 勤怠承認"}, {"fn": "勤怠エラーリスト", "q": "勤怠エラーを一覧で確認できる場所はどれですか？", "choices": ["マイシフト", "勤務データ確認", "勤怠エラーリスト", "ダッシュボード"], "ans": 2, "explain": "メニューバーの勤怠エラーリストから確認できます。ダッシュボード上部の通知や画面右上のベルマークからもジャンプ可能です。\n📍 メニューバー ＞ 勤怠 ＞ 勤怠エラーリスト"}];
const alpha = ['A','B','C','D'];
let phase = 'form';
let userInfo = {};
let cur = 0, answers = new Array(qs.length).fill(null), done = false;
let surveyAnswers = {s1:0,s2:0,s3:0};

function render() {
  if (phase==='form') renderForm();
  else if (phase==='quiz') renderQuiz();
  else if (phase==='survey') renderSurvey();
  else renderResult();
}

function renderForm() {
  document.getElementById('app').innerHTML = `
    <div class="form-card">
      <div class="form-title">はじめに情報を入力してください</div>
      <div class="field">
        <label>会社名<span class="req">*</span></label>
        <input type="text" id="f-company" placeholder="例：株式会社○○フード">
        <div class="err-msg" id="e-company">会社名を入力してください</div>
      </div>
      <div class="field">
        <label>氏名<span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="例：田中 太郎">
        <div class="err-msg" id="e-name">氏名を入力してください</div>
      </div>
      <div class="field">
        <label>店舗名<span style="font-size:11px;color:#bbb;margin-left:4px">任意</span></label>
        <input type="text" id="f-store" placeholder="例：渋谷店">
      </div>
      <button class="start-btn" onclick="startQuiz()">クイズをスタートする</button>
    </div>
  `;
}

function startQuiz() {
  const company = document.getElementById('f-company').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const store = document.getElementById('f-store').value.trim();
  let valid = true;
  if (!company) { document.getElementById('f-company').classList.add('error'); document.getElementById('e-company').style.display='block'; valid=false; }
  else { document.getElementById('f-company').classList.remove('error'); document.getElementById('e-company').style.display='none'; }
  if (!name) { document.getElementById('f-name').classList.add('error'); document.getElementById('e-name').style.display='block'; valid=false; }
  else { document.getElementById('f-name').classList.remove('error'); document.getElementById('e-name').style.display='none'; }
  if (!valid) return;
  userInfo = { company, name, store };
  phase = 'quiz'; render();
}

function renderQuiz() {
  const q = qs[cur];
  const pct = Math.round(((cur+1)/qs.length)*100);
  document.getElementById('app').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta"><span>${q.fn}</span><span>${cur+1} / ${qs.length}</span></div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="dot-row">${qs.map((_,i)=>'<div class="dot'+(answers[i]!==null?' done':'')+(i===cur?' cur':'')+'" onclick="go('+i+')"></div>').join('')}</div>
    <div class="q-card">
      <div class="q-fn">${q.fn}</div>
      <div class="q-text">Q${cur+1}. ${q.q}</div>
      <div class="choices">${q.choices.map((c,i)=>'<button class="choice'+(answers[cur]===i?' selected':'')+'" onclick="sel('+i+')">'+alpha[i]+'. '+c+'</button>').join('')}</div>
    </div>
    <div class="nav">
      <button class="btn" onclick="prev()" ${cur===0?'disabled':''}>← 前へ</button>
      <button class="btn" onclick="next()" ${cur===qs.length-1?'disabled':''}>次へ →</button>
      <button class="btn btn-primary" onclick="submitQuiz()" ${answers.includes(null)?'disabled':''}>採点する</button>
    </div>
  `;
}

function go(i){cur=i;render();}
function sel(i){
  answers[cur]=i;
  render();
  setTimeout(()=>{
    if(cur<qs.length-1){cur++;render();}
  },300);
}
function prev(){if(cur>0){cur--;render();}}
function next(){if(cur<qs.length-1){cur++;render();}}
function submitQuiz(){if(answers.includes(null))return;done=true;phase='survey';render();}

function renderSurvey() {
  document.getElementById('app').innerHTML = `
    <div class="survey-card">
      <div class="survey-title">アンケートにご協力ください</div>
      <div class="survey-sub">担当者・MTGについて教えてください。採点結果はこの後表示されます。</div>
      <div class="survey-q">
        <div class="survey-q-label">① 説明はわかりやすかったですか？</div>
        <div class="scale-row">${[1,2,3,4,5].map(v=>`<button class="scale-btn" data-q="s1" data-v="${v}" onclick="setScale('s1',${v})">${v}</button>`).join('')}</div>
        <div class="survey-err" id="err-s1">評価を選んでください</div>
      </div>
      <div class="survey-q">
        <div class="survey-q-label">② 質問・不明点に適切に回答してもらえましたか？</div>
        <div class="scale-row">${[1,2,3,4,5].map(v=>`<button class="scale-btn" data-q="s2" data-v="${v}" onclick="setScale('s2',${v})">${v}</button>`).join('')}</div>
        <div class="survey-err" id="err-s2">評価を選んでください</div>
      </div>
      <div class="survey-q">
        <div class="survey-q-label">③ MTGの進行ペースはちょうどよかったですか？</div>
        <div class="scale-row">${[1,2,3,4,5].map(v=>`<button class="scale-btn" data-q="s3" data-v="${v}" onclick="setScale('s3',${v})">${v}</button>`).join('')}</div>
        <div class="survey-err" id="err-s3">評価を選んでください</div>
      </div>
      <button class="submit-survey" onclick="submitSurvey()">次へ（採点結果を見る）</button>
    </div>
  `;
}

function setScale(q,val){
  surveyAnswers[q]=val;
  document.querySelectorAll('.scale-btn[data-q="'+q+'"]').forEach(s=>{
    s.classList.toggle('active', parseInt(s.dataset.v)===val);
  });
}

function submitSurvey(){
  let valid=true;
  ['s1','s2','s3'].forEach(q=>{
    const err=document.getElementById('err-'+q);
    if(!surveyAnswers[q]){err.style.display='block';valid=false;}
    else err.style.display='none';
  });
  if(!valid)return;
  sendData();
  phase='result';render();
}

function sendData(){
  const correct=qs.filter((_,i)=>answers[i]===qs[i].ans).length;
  const answerLabels=answers.map((a,i)=>{
    if(a===null)return '未回答';
    return alpha[a]+(a===qs[i].ans?' ○':' ✕');
  });
  const payload={
    company:userInfo.company,
    name:userInfo.name,
    store:userInfo.store,
    day:DAY,
    score:correct,
    total:qs.length,
    answers:answerLabels,
    survey_q1:surveyAnswers.s1,
    survey_q2:surveyAnswers.s2,
    survey_q3:surveyAnswers.s3
  };
  fetch(GAS_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).catch(()=>{});
}

function renderResult(){
  const correct=qs.filter((_,i)=>answers[i]===qs[i].ans).length;
  const pct=Math.round((correct/qs.length)*100);
  const cls=pct>=80?'great':pct>=60?'ok':'low';
  const msg=pct>=80?'理解度バッチリです！':'苦手な箇所を復習してみましょう。';
  document.getElementById('app').innerHTML=`
    <div class="result-card">
      <div style="font-size:11px;color:#ccc;font-weight:700;letter-spacing:0.06em;margin-bottom:4px">${userInfo.name} さんの結果</div>
      <div class="result-score ${cls}">${correct}<span style="font-size:20px;font-weight:400"> / ${qs.length}</span></div>
      <div class="result-label">${pct}点 · ${msg}</div>
      <div class="sending">※ 回答データを送信しました</div>
      <div class="review-list">${qs.map((q,i)=>{const ok=answers[i]===q.ans;return'<div class="review-item '+(ok?'c':'w')+'"><div>'+(ok?'○':'✕')+' Q'+(i+1)+'. '+q.q+'</div>'+(ok?'':'<div class="ans">正解：'+alpha[q.ans]+'. '+q.choices[q.ans]+'</div>')+'<div class="explain">'+q.explain+'</div></div>';}).join('')}</div>
      <div class="result-actions">
        <button class="btn" onclick="retry()">もう一度挑戦する</button>
      </div>
    </div>
  `;
}

function retry(){answers=new Array(qs.length).fill(null);cur=0;done=false;phase='form';userInfo={};surveyAnswers={s1:0,s2:0,s3:0};render();}
render();
</script>
</body>
</html>
